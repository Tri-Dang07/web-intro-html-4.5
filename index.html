<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Lịch Học Trong Tuần</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
    }
    table {
      width: 100%;
      border-collapse: collapse; /* Gộp viền bảng lại cho đẹp, không bị nét đôi */
      background-color: #ffffff;
      margin-top: 10px;
    }
    caption {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }
    th, td {
      border: 1px solid #cccccc;
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #0073e6;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2; /* Tô màu xen kẽ cho các dòng dễ nhìn */
    }
  </style>
</head>
<body>
  <h1>Thông tin đào tạo khóa học Front-End</h1>

  <table>
    <caption>Thời Khóa Biểu Lớp Lập Trình Web</caption>
    
    <tr>
      <th>Thứ / Ngày</th>
      <th>Môn học</th>
      <th>Thời gian</th>
      <th>Phòng học</th>
    </tr>

    <tr>
      <td>Thứ 2 - 15/06</td>
      <td>Xây dựng giao diện với HTML5/CSS3</td>
      <td>18:30 - 20:30</td>
      <td>Lab 01</td>
    </tr>

    <tr>
      <td>Thứ 4 - 17/06</td>
      <td>Tương tác Web với JavaScript cơ bản</td>
      <td>18:30 - 20:30</td>
      <td>Lab 01</td>
    </tr>
  </table>

  </body>
</html>
